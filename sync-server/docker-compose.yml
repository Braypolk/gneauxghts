services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gneauxghts_sync
      POSTGRES_PASSWORD: gneauxghts_sync
      POSTGRES_DB: gneauxghts_sync
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  sync-server:
    image: rust:1.88-bookworm
    working_dir: /workspace/sync-server
    command: >
      bash -lc "/usr/local/cargo/bin/cargo run"
    env_file:
      - .env
    volumes:
      - ..:/workspace
      - sync-blobs:/var/lib/gneauxghts-sync
    ports:
      - "8787:8787"
    depends_on:
      - postgres

volumes:
  postgres-data:
  sync-blobs:
